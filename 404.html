<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Out of Scope | Sri Nikhilesh Borra</title>
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Custom 404 Styles utilizing your existing CSS variables */
        body {
            overflow: hidden; /* Prevent scrolling on 404 */
        }
        
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #f8fafc 100%);
            text-align: center;
            padding: 2rem;
        }

        /* Reuse the hero animated background */
        .error-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        .error-content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            animation: fadeIn 0.8s ease-in-out;
        }

        .error-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            animation: float 6s ease-in-out infinite;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .error-subtitle {
            font-size: 2rem;
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .error-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <main class="error-section">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-compass"></i>
            </div>
            
            <h1 class="error-title gradient-text">404</h1>
            <h2 class="error-subtitle">Page Out of Scope</h2>
            
            <p class="error-text">
                Looks like this deliverable is missing from the sprint. The page you are looking for has been moved, deleted, or simply doesn't exist. Let's get operations back on track.
            </p>
            
            <div class="error-buttons">
                <a href="/sri-nikhilesh-borra/" class="btn btn-primary">
                    <i class="fas fa-home"></i> Return to Dashboard
                </a>
                <a href="/sri-nikhilesh-borra/#contact" class="btn btn-outline">
                    <i class="fas fa-paper-plane"></i> Contact Me
                </a>
            </div>
        </div>
    </main>

</body>
</html>
